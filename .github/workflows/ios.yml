#create Identifier:  (APP-IDs/APP/) add Push Notifications, Sign In with Apple
#then change bundle id in Step 8 below
#create Provisioning Profile: Distribution/App Store Connect then [Convert]::ToBase64String([IO.File]::ReadAllBytes("AppName.mobileprovision")) | Out-File "AppName_base64.txt"
#copy Provisioning Profile name to Step 5 & 8 below
#create App in App Store Connect


### necessary github action repository secrets:
#TEAM_ID: https://appstoreconnect.apple.com/access/users

#from: https://appstoreconnect.apple.com/access/integrations/api:
#APPSTORE_ISSUER_ID
#APPSTORE_API_KEY_ID
#APPSTORE_API_PRIVATE_KEY: open p8 File with text editor and copy content (with start and end lines)

#BUILD_CERTIFICATE_BASE64 #distribution certificate in base64 format (can be the same for many apps)
#P12_PASSWORD #password for distribution certificate

#BUILD_PROVISION_PROFILE_BASE64

#KEYCHAIN_PASSWORD #can be set freely

###necessary github action repository variables:
#BUNDLE_ID
#PROVISIONING_PROFILE_NAME
#DEPLOYMENT_TARGET
#FLUTTER_VERSION

### if youre using FirebaseFirestore including the precombiled binaries in the Podfile speeds up the build a lot: https://github.com/invertase/firestore-ios-sdk-frameworks

name: iOS Build and Deploy

on:
  workflow_dispatch:

jobs:
  ios_deployment:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      # Step 1: Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Flutter SDK
      - name: Set up Flutter SDK
        uses: flutter-actions/setup-flutter@v3
        env:
          FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION }}
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }} # Keep this up to date with flutter --version

      # Step 3: Install Dependencies
      - name: Install Dependencies
        run: |
          flutter clean
          flutter pub get
          flutter analyze --no-fatal-infos --no-fatal-warnings

      # Step 4: Initialize Keychain
      - name: Initialize Keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/app-signing.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/app-signing.keychain-db
          security list-keychain -d user -s $RUNNER_TEMP/app-signing.keychain-db

      # Step 5: Configure Provisioning Profile
      - name: Configure Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          PROVISIONING_PROFILE_NAME: ${{ vars.PROVISIONING_PROFILE_NAME }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/$PROVISIONING_PROFILE_NAME.mobileprovision

      # Step 6: Configure Distribution Certificate
      - name: Configure Distribution Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $RUNNER_TEMP/app-signing.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/app-signing.keychain-db
          # List the certificate to verify it's there
          security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db

      # Step 7: Parse Build Number and Name from pubspec.yaml
      - name: Parse Build Number and Name
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION=$(echo $VERSION_LINE | cut -d' ' -f2 | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $VERSION_LINE | cut -d'+' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      # Step 8: Generate ExportOptions.plist
      - name: Generate ExportOptions.plist
        env:
          BUNDLE_ID: ${{ vars.BUNDLE_ID }}
          PROVISIONING_PROFILE: ${{ vars.PROVISIONING_PROFILE_NAME }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          cat > ios/Runner/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>compileBitcode</key>
              <false/>
              <key>destination</key>
              <string>export</string>
              <key>method</key>
              <string>app-store-connect</string>
              <key>provisioningProfiles</key>
              <dict>
                 <key>${BUNDLE_ID}</key>
                 <string>${PROVISIONING_PROFILE}</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      # Step 8.5: Patch project.pbxproj for Manual Signing, this should be set by the ExportOption.plist but are currently not, see https://github.com/flutter/flutter/issues/113977
      - name: Patch project.pbxproj for Manual Signing
        env:
          BUNDLE_ID: ${{ vars.BUNDLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ vars.PROVISIONING_PROFILE_NAME }}
          DEPLOYMENT_TARGET: ${{ vars.DEPLOYMENT_TARGET }}
        run: |
          pip install pbxproj --break-system-packages
          
          python3 - <<EOF
          import os
          from pbxproj import XcodeProject
          
          bundle_id     = os.environ['BUNDLE_ID']
          team_id       = os.environ['TEAM_ID']
          pp_name       = os.environ['PROVISIONING_PROFILE_NAME']
          deploy_target = os.environ['DEPLOYMENT_TARGET']
          
          project = XcodeProject.load('ios/Runner.xcodeproj/project.pbxproj')
          
          # Uses the library's actual documented API
          # target_name='Runner' scopes all changes away from test targets
          project.add_flags('CODE_SIGN_STYLE', 'Manual', target_name='Runner')
          project.add_flags('CODE_SIGN_IDENTITY', 'Apple Development', target_name='Runner')
          project.add_flags('PRODUCT_BUNDLE_IDENTIFIER', bundle_id, target_name='Runner')
          project.add_flags('DEVELOPMENT_TEAM', team_id, target_name='Runner')
          project.add_flags('IPHONEOS_DEPLOYMENT_TARGET', deploy_target, target_name='Runner')
          
          # add_code_sign sets CODE_SIGN_IDENTITY, DEVELOPMENT_TEAM,
          # PROVISIONING_PROFILE_SPECIFIER (and optionally UUID) together
          project.add_code_sign(
            'Apple Distribution',
            team_id,
            '',          # provisioning_profile_uuid — required but ignored in Xcode 8+
            pp_name,     # provisioning_profile_specifier
            target_name='Runner'
          )
          
          project.save()
          print("project.pbxproj patched successfully")
          EOF

      # Step 9: Build IPA (can add --verbose for more logging)
      - name: Build IPA
        run: |
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --build-name=$VERSION \
            --export-options-plist=ios/Runner/ExportOptions.plist
        timeout-minutes: 30

      # Step 10: Create API Key File
      - name: Create API Key File
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPSTORE_API_KEY" > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8
          chmod 600 ~/.private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8

      # Step 11: Upload IPA to App Store Connect
      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          xcrun altool --upload-app -f build/ios/ipa/*.ipa -t ios --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID"


      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="v$VERSION"
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          
          # 1. Check if release already exists.
          # If it does, just upload the asset to the existing release.
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Release $TAG_NAME exists. Uploading asset..."
            gh release upload "$TAG_NAME" "$IPA_PATH" --clobber
          else
            # 2. Create new release and attach asset in one step
            echo "Creating release $TAG_NAME..."
            gh release create "$TAG_NAME" "$IPA_PATH" \
              --title "Release $TAG_NAME" \
              --draft=true \
              --prerelease=false \
              --generate-notes
          fi

      # Step 13: Cleanup Keychain and Profiles
      - name: Cleanup
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles
          rm -rf ~/.private_keys
